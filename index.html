<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Builder Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }
        h1 { color: white; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 24px; }
        
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 10px;
            width: 100%;
            justify-content: center;
        }
        
        /* --- Палітра --- */
        .color-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 95vw;
            overflow-x: auto; /* Прокрутка, якщо кольорів багато */
            white-space: nowrap;
        }
        .color-picker {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%; /* Тепер круглі кнопки */
            cursor: pointer;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .color-btn:hover { transform: scale(1.2); z-index: 10; position: relative; }
        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px #333;
            transform: scale(1.15);
        }
        
        /* --- Панель фігур --- */
        .shape-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }
        .shape-btn {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shape-btn.active {
            border-color: #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }
        .preview-shape { width: 20px; height: 20px; background: #ff0000; }
        .p-sq { border-radius: 4px; }
        .p-circ { border-radius: 50%; }
        .p-tri {
            width: 0; height: 0; background: transparent;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #ff0000;
        }
        
        .clear-btn {
            background: #ff4757; color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        
        /* --- Сітка --- */
        #grid {
            display: grid;
            grid-template-columns: repeat(30, 25px); /* Трохи зменшив клітинки, щоб влізло */
            grid-template-rows: repeat(22, 25px);
            gap: 1px;
            background: #87CEEB;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            max-width: 98vw;
            overflow: auto;
        }
        .cell {
            width: 25px; height: 25px;
            background: #E0F7FA;
            cursor: pointer;
        }
        .cell:hover { opacity: 0.8; }
        
        /* Форми клітинок */
        .cell.square { border-radius: 3px; }
        .cell.circle { border-radius: 50%; }
        .cell.triangle {
            background: transparent !important;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 25px solid;
        }

        .info { color: #ccc; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🎮 Block Builder Ultimate</h1>
    
    <div class="toolbar">
        <!-- Кольори (Прокручується) -->
        <div class="color-panel">
            <div class="color-picker">
                <!-- ОСНОВНІ (23) -->
                <button class="color-btn active" style="background:#ff0000" data-c="#ff0000"></button>
                <button class="color-btn" style="background:#ff4a00" data-c="#ff4a00"></button>
                <button class="color-btn" style="background:#ff6300" data-c="#ff6300"></button>
                <button class="color-btn" style="background:#ff8800" data-c="#ff8800"></button>
                <button class="color-btn" style="background:#ffad00" data-c="#ffad00"></button>
                <button class="color-btn" style="background:#ffde00" data-c="#ffde00"></button>
                <button class="color-btn" style="background:#d6ff00" data-c="#d6ff00"></button>
                <button class="color-btn" style="background:#a5ff00" data-c="#a5ff00"></button>
                <button class="color-btn" style="background:#42ff00" data-c="#42ff00"></button>
                <button class="color-btn" style="background:#00ff84" data-c="#00ff84"></button>
                <button class="color-btn" style="background:#00ffe6" data-c="#00ffe6"></button>
                <button class="color-btn" style="background:#00c1ff" data-c="#00c1ff"></button>
                <button class="color-btn" style="background:#0016ff" data-c="#0016ff"></button>
                <button class="color-btn" style="background:#5a00ff" data-c="#5a00ff"></button>
                <button class="color-btn" style="background:#8a00ff" data-c="#8a00ff"></button>
                <button class="color-btn" style="background:#e100ff" data-c="#e100ff"></button>
                <button class="color-btn" style="background:#ff00ec" data-c="#ff00ec"></button>
                <button class="color-btn" style="background:#ff0095" data-c="#ff0095"></button>
                <button class="color-btn" style="background:#ffffff" data-c="#ffffff"></button>
                <button class="color-btn" style="background:#bfbfbf" data-c="#bfbfbf"></button>
                <button class="color-btn" style="background:#808080" data-c="#808080"></button>
                <button class="color-btn" style="background:#404040" data-c="#404040"></button>
                <button class="color-btn" style="background:#000000" data-c="#000000"></button>
                
                <!-- СВІТЛІ (7) -->
                <div style="width:5px;"></div> <!-- Роздільник -->
                <button class="color-btn" style="background:#ff8080" data-c="#ff8080" title="Світлий кавун"></button>
                <button class="color-btn" style="background:#ffc380" data-c="#ffc380" title="Бежевий"></button>
                <button class="color-btn" style="background:#ffee80" data-c="#ffee80" title="Лимонний"></button>
                <button class="color-btn" style="background:#a2ff80" data-c="#a2ff80" title="Салатовий"></button>
                <button class="color-btn" style="background:#808aff" data-c="#808aff" title="Світло-синій"></button>
                <button class="color-btn" style="background:#c380ff" data-c="#c380ff" title="Світлий фіолетовий"></button>
                <button class="color-btn" style="background:#ff80f7" data-c="#ff80f7" title="Світло-рожевий"></button>

                <!-- ТЕМНІ (7) -->
                <div style="width:5px;"></div>
                <button class="color-btn" style="background:#800000" data-c="#800000" title="Гниль"></button>
                <button class="color-btn" style="background:#804400" data-c="#804400" title="Коричневий"></button>
                <button class="color-btn" style="background:#806f00" data-c="#806f00" title="Болото"></button>
                <button class="color-btn" style="background:#228000" data-c="#228000" title="Зелений"></button>
                <button class="color-btn" style="background:#000b80" data-c="#000b80" title="Ніч"></button>
                <button class="color-btn" style="background:#440080" data-c="#440080" title="Віноград"></button>
                <button class="color-btn" style="background:#800077" data-c="#800077" title="Темно-рожевий"></button>

                <!-- НІЖНІ (7) -->
                <div style="width:5px;"></div>
                <button class="color-btn" style="background:#ff4040" data-c="#ff4040" title="Кавуновий"></button>
                <button class="color-btn" style="background:#ffa640" data-c="#ffa640" title="Ніжний помаранчевий"></button>
                <button class="color-btn" style="background:#ffe640" data-c="#ffe640" title="Диня"></button>
                <button class="color-btn" style="background:#73ff40" data-c="#73ff40" title="Ніжний зелений"></button>
                <button class="color-btn" style="background:#4050ff" data-c="#4050ff" title="Океанічний"></button>
                <button class="color-btn" style="background:#a640ff" data-c="#a640ff" title="Ніжний фіолетовий"></button>
                <button class="color-btn" style="background:#ff40f2" data-c="#ff40f2" title="Ніжний рожевий"></button>

                <div style="width:10px;"></div>
                <button class="clear-btn" onclick="clearGrid()">🗑️</button>
            </div>
        </div>

        <!-- Фігури -->
        <div class="shape-panel">
            <button class="shape-btn active" data-s="square"><div class="preview-shape p-sq"></div></button>
            <button class="shape-btn" data-s="circle"><div class="preview-shape p-circ"></div></button>
            <button class="shape-btn" data-s="triangle"><div class="preview-shape p-tri"></div></button>
        </div>
    </div>

    <div id="grid"></div>
    <div class="info">ЛКМ - малювати | Права панель - зміна форми</div>

    <script>
        let color = '#ff0000';
        let shape = 'square';
        let isPainting = false;
        const grid = document.getElementById('grid');

        // Створення сітки
        for(let i=0; i<30*22; i++){
            const cell = document.createElement('div');
            cell.className = 'cell square';
            cell.onmousedown = () => { isPainting=true; draw(cell); };
            cell.onmouseenter = () => { if(isPainting) draw(cell); };
            grid.appendChild(cell);
        }
        document.onmouseup = () => isPainting=false;

        // Вибір кольору
        document.querySelectorAll('.color-btn[data-c]').forEach(btn => {
            btn.onclick = function(){
                document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
                this.classList.add('active');
                color = this.dataset.c;
                updatePreviews();
            }
        });

        // Вибір фігури
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.onclick = function(){
                document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
                this.classList.add('active');
                shape = this.dataset.s;
            }
        });

        function draw(cell){
            cell.className = 'cell ' + shape;
            if(shape === 'triangle'){
                cell.style.background = 'transparent';
                cell.style.borderBottomColor = color;
            } else {
                cell.style.background = color;
                cell.style.borderBottom = '';
            }
        }

        function updatePreviews(){
            document.querySelectorAll('.preview-shape').forEach(el => {
                if(el.classList.contains('p-tri')) el.style.borderBottomColor = color;
                else el.style.background = color;
            });
        }

        function clearGrid(){
            if(confirm('Очистити все?')){
                document.querySelectorAll('.cell').forEach(c => {
                    c.className = 'cell square';
                    c.style.background = '#E0F7FA';
                    c.style.borderBottom = '';
                });
            }
        }
    </script>
</body>
</html>
