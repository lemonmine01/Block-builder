<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Builder Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        h1 { 
            color: white; 
            margin: 10px 0 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            font-size: 26px;
            text-align: center;
            position: relative;
            z-index: 1000;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 10px;
            width: 100%;
            justify-content: center;
            position: relative;
            z-index: 500;
        }
        
        .color-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 96vw;
            max-width: 1200px;
            overflow: visible;
        }

        .color-picker {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 26px;
            height: 26px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s;
            flex-shrink: 0;
            user-select: none;
            position: relative;
        }
        .color-btn:hover { transform: scale(1.25); z-index: 10; }
        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px #333;
            transform: scale(1.15);
        }
        /* Підказки */
        .color-btn:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .color-btn:hover::after { opacity: 1; }

        .shape-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }
        .shape-btn {
            width: 40px; height: 40px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
        .shape-btn.active {
            border-color: #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }
        .preview-shape { width: 20px; height: 20px; background: #ff0000; }
        .p-sq { border-radius: 4px; }
        .p-circ { border-radius: 50%; }
        .p-tri {
            width: 0; height: 0; background: transparent;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 20px solid #ff0000;
        }
        
        .clear-btn {
            background: #ff4757; color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
            user-select: none;
        }
        
        #grid {
            display: grid;
            grid-template-columns: repeat(30, 25px);
            grid-template-rows: repeat(22, 25px);
            gap: 1px;
            background: #87CEEB;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            max-width: 98vw;
            overflow: auto;
        }
        .cell { width: 25px; height: 25px; background: #E0F7FA; cursor: pointer; }
        .cell:hover { opacity: 0.8; }
        .cell.square { border-radius: 3px; }
        .cell.circle { border-radius: 50%; }
        .cell.triangle {
            background: transparent !important; width: 0; height: 0;
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-bottom: 25px solid;
        }
    </style>
</head>
<body>
    <h1>🎮 Block Builder Ultimate</h1>
    
    <div class="toolbar">
        <div class="color-panel">
            <div class="color-picker">
                <!-- 🌈 ГРУПА 3: НЕОСНОВНІ (15) -->
                <button class="color-btn active" style="background:#ff4a00" data-c="#ff4a00" title="Вогняний червоний"></button>
                <button class="color-btn" style="background:#ff6300" data-c="#ff6300" title="Вогняний"></button>
                <button class="color-btn" style="background:#ffad00" data-c="#ffad00" title="Вогняний жовтий"></button>

                <button class="color-btn" style="background:#42ff00" data-c="#42ff00" title="Яскраво-зелений"></button>
                <button class="color-btn" style="background:#00ff84" data-c="#00ff84" title="Бірюзовий"></button>
                <button class="color-btn" style="background:#00ffe6" data-c="#00ffe6" title="Голубий"></button>
                <button class="color-btn" style="background:#00c1ff" data-c="#00c1ff" title="Сіановий"></button>
                <button class="color-btn" style="background:#0016ff" data-c="#0016ff" title="Синій"></button>
                <button class="color-btn" style="background:#5a00ff" data-c="#5a00ff" title="Синьо-фіолетовий"></button>
                <button class="color-btn" style="background:#8a00ff" data-c="#8a00ff" title="Фіолетовий"></button>
                <button class="color-btn" style="background:#e100ff" data-c="#e100ff" title="Фіолетово-рожевий"></button>
                <button class="color-btn" style="background:#ff00ec" data-c="#ff00ec" title="Рожевий"></button>
                <button class="color-btn" style="background:#ff0095" data-c="#ff0095" title="Малиновий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- ☀️ ГРУПА 2: ВІДТІНКИ ОСНОВНИХ - ЯСНІ (7) -->
                <button class="color-btn" style="background:#ffbfbf" data-c="#ffbfbf" title="Переспілий кавун"></button>
                <button class="color-btn" style="background:#ffe1bf" data-c="#ffe1bf" title="Ясний помаранчевий"></button>
                <button class="color-btn" style="background:#fff7bf" data-c="#fff7bf" title="Переспіла диня"></button>
                <button class="color-btn" style="background:#d0ffbf" data-c="#d0ffbf" title="Недоспіла капуста"></button>
                <button class="color-btn" style="background:#bfc5ff" data-c="#bfc5ff" title="Синя зоря"></button>
                <button class="color-btn" style="background:#e1bfff" data-c="#e1bfff" title="Фіолетове сяйво"></button>
                <button class="color-btn" style="background:#ffbffb" data-c="#ffbffb" title="Рожева класика"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 🤍 ГРУПА 2: ВІДТІНКИ ОСНОВНИХ - СВІТЛІ (7) -->
                <button class="color-btn" style="background:#ff8080" data-c="#ff8080" title="Світлий кавун"></button>
                <button class="color-btn" style="background:#ffc380" data-c="#ffc380" title="Бежевий"></button>
                <button class="color-btn" style="background:#ffee80" data-c="#ffee80" title="Лимонний"></button>
                <button class="color-btn" style="background:#a2ff80" data-c="#a2ff80" title="Салатовий"></button>
                <button class="color-btn" style="background:#808aff" data-c="#808aff" title="Світло-синій"></button>
                <button class="color-btn" style="background:#c380ff" data-c="#c380ff" title="Світлий фіолетовий"></button>
                <button class="color-btn" style="background:#ff80f7" data-c="#ff80f7" title="Світло-рожевий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 🌸 ГРУПА 2: ВІДТІНКИ ОСНОВНИХ - НІЖНІ (7) -->
                <button class="color-btn" style="background:#ff4040" data-c="#ff4040" title="Кавуновий"></button>
                <button class="color-btn" style="background:#ffa640" data-c="#ffa640" title="Ніжний помаранчевий"></button>
                <button class="color-btn" style="background:#ffe640" data-c="#ffe640" title="Диня"></button>
                <button class="color-btn" style="background:#73ff40" data-c="#73ff40" title="Ніжний зелений"></button>
                <button class="color-btn" style="background:#4050ff" data-c="#4050ff" title="Океанічний"></button>
                <button class="color-btn" style="background:#a640ff" data-c="#a640ff" title="Ніжний фіолетовий"></button>
                <button class="color-btn" style="background:#ff40f2" data-c="#ff40f2" title="Ніжний рожевий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 🔴 ГРУПА 1: ОСНОВНІ (7) -->
                <button class="color-btn" style="background:#ff0000" data-c="#ff0000" title="Червоний"></button>
                <button class="color-btn" style="background:#ff8800" data-c="#ff8800" title="Помаранчевий"></button>
                <button class="color-btn" style="background:#ffde00" data-c="#ffde00" title="Жовтий"></button>
                <button class="color-btn" style="background:#42ff00" data-c="#42ff00" title="Яскраво-зелений"></button>
                <button class="color-btn" style="background:#0016ff" data-c="#0016ff" title="Синій"></button>
                <button class="color-btn" style="background:#8a00ff" data-c="#8a00ff" title="Фіолетовий"></button>
                <button class="color-btn" style="background:#ff00ec" data-c="#ff00ec" title="Рожевий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 🍒 ГРУПА 2: ВІДТІНКИ ОСНОВНИХ - ТЕМНУВАТІ (7) -->
                <button class="color-btn" style="background:#bf0000" data-c="#bf0000" title="Вишня"></button>
                <button class="color-btn" style="background:#bf6600" data-c="#bf6600" title="Корж"></button>
                <button class="color-btn" style="background:#bfa600" data-c="#bfa600" title="Темнуватий жовтий"></button>
                <button class="color-btn" style="background:#33bf00" data-c="#33bf00" title="Трава"></button>
                <button class="color-btn" style="background:#0010bf" data-c="#0010bf" title="Класичний синій"></button>
                <button class="color-btn" style="background:#6600bf" data-c="#6600bf" title="Фіолетова класика"></button>
                <button class="color-btn" style="background:#bf00b3" data-c="#bf00b3" title="Темнуватий рожевий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 🌑 ГРУПА 2: ВІДТІНКИ ОСНОВНИХ - ТЕМНІ (7) -->
                <button class="color-btn" style="background:#800000" data-c="#800000" title="Гниль"></button>
                <button class="color-btn" style="background:#804400" data-c="#804400" title="Коричневий"></button>
                <button class="color-btn" style="background:#806f00" data-c="#806f00" title="Болото"></button>
                <button class="color-btn" style="background:#228000" data-c="#228000" title="Зелений"></button>
                <button class="color-btn" style="background:#000b80" data-c="#000b80" title="Ніч"></button>
                <button class="color-btn" style="background:#440080" data-c="#440080" title="Віноград"></button>
                <button class="color-btn" style="background:#800077" data-c="#800077" title="Темно-рожевий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 🌫️ ГРУПА 2: ВІДТІНКИ ОСНОВНИХ - МУТНІ (7) -->
                <button class="color-btn" style="background:#400000" data-c="#400000" title="Мутний червоний"></button>
                <button class="color-btn" style="background:#402200" data-c="#402200" title="Темний коричневий"></button>
                <button class="color-btn" style="background:#403700" data-c="#403700" title="Темне болото"></button>
                <button class="color-btn" style="background:#114000" data-c="#114000" title="Темний зелений"></button>
                <button class="color-btn" style="background:#000540" data-c="#000540" title="Повна ніч"></button>
                <button class="color-btn" style="background:#220040" data-c="#220040" title="Гнилий виноград"></button>
                <button class="color-btn" style="background:#40003c" data-c="#40003c" title="Мутний рожевий"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- ⚪ ГРУПА 4: НЕЙТРАЛЬНІ (5) -->
                <button class="color-btn" style="background:#ffffff" data-c="#ffffff" title="Білий"></button>
                <button class="color-btn" style="background:#bfbfbf" data-c="#bfbfbf" title="Світло-сірий"></button>
                <button class="color-btn" style="background:#808080" data-c="#808080" title="Сірий"></button>
                <button class="color-btn" style="background:#404040" data-c="#404040" title="Темно-сірий"></button>
                <button class="color-btn" style="background:#000000" data-c="#000000" title="Чорний"></button>

                <div style="width:12px; flex-shrink:0;"></div>

                <!-- 💎 ГРУПА 5: ДОДАТКОВІ (3) -->
                <button class="color-btn" style="background:#f3b800" data-c="#f3b800" title="Золото"></button>
                <button class="color-btn" style="background:#f3f3f3" data-c="#f3f3f3" title="Срібло"></button>
                <button class="color-btn" style="background:#b5823f" data-c="#b5823f" title="Молочний шоколад"></button> <!-- ✅ ЗМІНЕНО -->

                <div style="width:10px; flex-shrink:0;"></div>
                <button class="clear-btn" onclick="clearGrid()">🗑️</button>
            </div>
        </div>

        <div class="shape-panel">
            <button class="shape-btn active" data-s="square"><div class="preview-shape p-sq"></div></button>
            <button class="shape-btn" data-s="circle"><div class="preview-shape p-circ"></div></button>
            <button class="shape-btn" data-s="triangle"><div class="preview-shape p-tri"></div></button>
        </div>
    </div>

    <div id="grid"></div>

    <script>
        let color = '#ff4a00'; // Зробив вогняний червоний активним за замовчуванням
        let shape = 'square';
        let isPainting = false;
        const grid = document.getElementById('grid');

        for(let i=0; i<30*22; i++){
            const cell = document.createElement('div');
            cell.className = 'cell square';
            cell.onmousedown = () => { isPainting=true; draw(cell); };
            cell.onmouseenter = () => { if(isPainting) draw(cell); };
            grid.appendChild(cell);
        }
        document.onmouseup = () => isPainting=false;

        document.querySelectorAll('.color-btn[data-c]').forEach(btn => {
            btn.onclick = function(e){
                e.stopPropagation();
                document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
                this.classList.add('active');
                color = this.dataset.c;
                updatePreviews();
            }
        });

        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.onclick = function(e){
                e.stopPropagation();
                document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
                this.classList.add('active');
                shape = this.dataset.s;
            }
        });

        document.querySelector('.clear-btn').onclick = function(e){ e.stopPropagation(); };

        function draw(cell){
            cell.className = 'cell ' + shape;
            if(shape === 'triangle'){
                cell.style.background = 'transparent';
                cell.style.borderBottomColor = color;
            } else {
                cell.style.background = color;
                cell.style.borderBottom = '';
            }
        }

        function updatePreviews(){
            document.querySelectorAll('.preview-shape').forEach(el => {
                if(el.classList.contains('p-tri')) el.style.borderBottomColor = color;
                else el.style.background = color;
            });
        }

        function clearGrid(){
            if(confirm('Очистити все поле?')){
                document.querySelectorAll('.cell').forEach(c => {
                    c.className = 'cell square';
                    c.style.background = '#E0F7FA';
                    c.style.borderBottom = '';
                });
            }
        }
    </script>
</body>
</html>
